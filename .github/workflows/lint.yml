name: Lint code

on:
  push

# Least privilege: the only write this job needs is committing the ruff
# auto-fixes back to the branch. (Previously: write-all.)
permissions:
  contents: write

jobs:
  ruff:
    name: Run Ruff
    runs-on: ubuntu-latest

    steps:
    # Actions are pinned by commit SHA (not a mutable tag) so a compromised or
    # retagged upstream cannot inject code into this job — cf. the tj-actions
    # incident (CVE-2025-30066).
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: "3.x"

    - name: Install ruff
      run: |
        python3 -m pip install ruff

    - name: Run ruff
      run: |
        ruff format
        ruff check

    - name: Verify Changed files
      uses: tj-actions/verify-changed-files@a1c6acee9df209257a246f2cc6ae8cb6581c1edf # v20
      id: verify-changed-files
      with:
        files: aiomax/**

    - name: Commit changes
      uses: iarekylew00t/verified-bot-commit@7c65c374f3a553aff88ab7f06819971889822c20 # v1
      if: steps.verify-changed-files.outputs.files_changed == 'true'
      with:
        message: 'Run Ruff'
        files: aiomax/**
